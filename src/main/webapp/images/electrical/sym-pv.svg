<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="-34 -52 68 112">
<!-- Sun -->
    <circle cx="22" cy="-40" r="6" fill="#e6a817"/>
    <line x1="22" y1="-49" x2="22" y2="-47" stroke="#e6a817" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="22" y1="-33" x2="22" y2="-31" stroke="#e6a817" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="13" y1="-40" x2="15" y2="-40" stroke="#e6a817" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="29" y1="-40" x2="31" y2="-40" stroke="#e6a817" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="15" y1="-46" x2="16" y2="-45" stroke="#e6a817" stroke-width="1.4" stroke-linecap="round"/>
    <line x1="28" y1="-35" x2="29" y2="-34" stroke="#e6a817" stroke-width="1.4" stroke-linecap="round"/>
    <line x1="15" y1="-34" x2="16" y2="-35" stroke="#e6a817" stroke-width="1.4" stroke-linecap="round"/>
    <line x1="28" y1="-45" x2="29" y2="-46" stroke="#e6a817" stroke-width="1.4" stroke-linecap="round"/>
    <!-- Solar panel (tilted ~12 deg) -->
    <g transform="rotate(-12,0,-28)">
      <rect x="-20" y="-44" width="38" height="26" rx="2" fill="#b8d8f0" stroke="#1a1a2e" stroke-width="1.8"/>
      <line x1="-7.3" y1="-44" x2="-7.3" y2="-18" stroke="#1a1a2e" stroke-width="0.8"/>
      <line x1="5.3"  y1="-44" x2="5.3"  y2="-18" stroke="#1a1a2e" stroke-width="0.8"/>
      <line x1="-20"  y1="-35" x2="18"   y2="-35" stroke="#1a1a2e" stroke-width="0.8"/>
      <line x1="-20"  y1="-26" x2="18"   y2="-26" stroke="#1a1a2e" stroke-width="0.8"/>
    </g>
    <!-- DC wire to inverter -->
    <line x1="0" y1="-16" x2="0" y2="-6" stroke="#1a1a2e" stroke-width="1.5" stroke-dasharray="3,2"/>
    <text x="3" y="-10" font-family="monospace" font-size="6" fill="#c0392b">DC</text>
    <!-- Inverter box -->
    <rect x="-18" y="-6" width="36" height="22" rx="3" fill="#f0f4ff" stroke="#1a1a2e" stroke-width="2"/>
    <text x="-8" y="3" font-family="monospace" font-size="7" font-weight="bold" fill="#1a1a2e">DC</text>
    <line x1="-1" y1="0" x2="3" y2="0" stroke="#1a1a2e" stroke-width="0.8"/>
    <polygon points="3,0 1,-2 1,2" fill="#1a1a2e"/>
    <path d="M4 4 Q6 0 8 4 Q10 8 12 4" fill="none" stroke="#1a1a2e" stroke-width="1.3"/>
    <!-- AC output -->
    <line x1="0" y1="16" x2="0" y2="28" stroke="#1a1a2e" stroke-width="2"/>
    <circle cx="0" cy="28" r="3" fill="#1a1a2e"/>
    <line x1="0" y1="28" x2="0" y2="36" stroke="#1a1a2e" stroke-width="1.5" stroke-linecap="square"/>
</svg>
