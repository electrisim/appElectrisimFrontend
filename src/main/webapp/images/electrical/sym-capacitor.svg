<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 160" width="100" height="160">
  <!-- Top lead wire -->
  <line x1="50" y1="0" x2="50" y2="65" stroke="#1a1a2e" stroke-width="3" stroke-linecap="round"/>

  <!-- Top plate (flat) -->
  <line x1="15" y1="65" x2="85" y2="65" stroke="#1a1a2e" stroke-width="4" stroke-linecap="round"/>

  <!-- Bottom plate (flat) -->
  <line x1="15" y1="80" x2="85" y2="80" stroke="#1a1a2e" stroke-width="4" stroke-linecap="round"/>

  <!-- Bottom lead wire connecting to ground bar -->
  <line x1="50" y1="80" x2="50" y2="155" stroke="#1a1a2e" stroke-width="3" stroke-linecap="round"/>

  <!-- Bottom horizontal bar (ground-style) -->
  <line x1="25" y1="155" x2="75" y2="155" stroke="#1a1a2e" stroke-width="4" stroke-linecap="round"/>
</svg>
