<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80">
  <!-- Vertical line from top to triangle apex -->
  <line x1="40" y1="0" x2="40" y2="20" stroke="black" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Downward-pointing triangle (open) -->
  <polygon points="40,70 10,20 70,20" fill="none" stroke="black" stroke-width="2.5" stroke-linejoin="round"/>
</svg>
